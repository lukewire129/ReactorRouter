name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.x
            10.x

      - name: Install MAUI workloads
        run: |
          dotnet workload install maui-android maui-ios maui-maccatalyst maui-windows

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack src/ReactorRouter/ReactorRouter.csproj
          -c Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o nupkgs

      - name: Push to NuGet
        shell: bash
        run: >
          dotnet nuget push nupkgs/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" --json id > /dev/null 2>&1 \
            && gh release upload "${{ github.ref_name }}" nupkgs/*.nupkg --clobber \
            || gh release create "${{ github.ref_name }}" \
               --title "${{ github.ref_name }}" \
               --generate-notes \
               nupkgs/*.nupkg
